services:
  survey-intelligence:
    build:
      context: .
      dockerfile: Dockerfile
    image: survey_intelligence
    # All config (secrets + tunables) comes from .env so this list never drifts.
    env_file:
      - .env
    restart: always
    mem_limit: 4G
    mem_reservation: 1G
    # Published on localhost only — nginx (syntheticdata.ddns.net) proxies to 127.0.0.1:$PORT_NUMBER.
    ports:
      - "127.0.0.1:${PORT_NUMBER}:${PORT_NUMBER}"
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
      - ./runs:/app/runs
      - ./exports:/app/exports
      - ./tracking:/app/tracking
      # shared/ holds the result-link JSON files ("links survive restarts") — must persist.
      - ./shared:/app/shared
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os,urllib.request; urllib.request.urlopen('http://127.0.0.1:'+os.environ['PORT_NUMBER'])\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
